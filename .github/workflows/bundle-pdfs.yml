name: Bundle PDFs into Artifact

on:
  workflow_call:

jobs:
  bundle-pdfs:
    name: Bundle PDFs
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          skip-decompress: true
          path: pdfs
          pattern: '*-notes.pdf'

      - name: Rename PDFs
        run: |
          for f in pdfs/*-notes.pdf; do
            mv "$f" "${f%-notes.pdf}.pdf"
          done

      - name: Upload Combined PDF Artifact
        uses: actions/upload-artifact@v7
        with:
          name: compiled-pdfs
          path: pdfs