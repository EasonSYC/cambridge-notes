name: Check Recent Commits

on:
  workflow_call:
    inputs:
      since-hours:
        required: false
        type: number
        default: 24
    outputs:
      has-new-commits:
        description: "Whether Any Course has New Commits"
        value: ${{ jobs.check-commits.outputs.has-new-commits }}

jobs:
  check-commits:
    name: Check Recent Commits
    runs-on: ubuntu-latest
    outputs:
      has-new-commits: ${{ steps.check.outputs.has-new-commits }}
    steps:
      - name: Check each course for recent commits
        id: check
        run: |
          SINCE=$(date -u -d '${{ inputs.since-hours }} hours ago' +"%Y-%m-%dT%H:%M:%SZ")
          HAS_NEW_COMMITS=false

          while read course; do
            COUNT=$(gh api "repos/EasonSYC/$COURSE/commits?since=$SINCE&per_page=1" --jq 'length')

            if [ "$COUNT" -gt 0 ]; then
              HAS_NEW_COMMITS=true
              break
            fi

          done << .github/course.list

          echo "has-new-commits=$HAS_NEW_COMMITS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}