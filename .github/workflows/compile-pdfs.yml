name: Compile PDFs

on:
  workflow_call:
    inputs:
      matrix:
        description: 'Course Matrix'
        required: true
        type: string
    outputs:
      artifact-ids:
        description: 'Artifact IDs'
        value: ${{ jobs.collect-ids.outputs.artifact-ids-list }}

jobs:
  compile-pdfs:
    name: Compile PDF — ${{ matrix.course }}
    strategy:
      matrix: ${{ fromJson(inputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    outputs:
      artifact-ids: ${{ steps.compile-pdf.outputs.artifact-ids }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: EasonSYC/${{ matrix.course }}
          path: ${{ matrix.course }}

      - name: Setup TeX Live
        uses: EasonSYC/latex-style-setup@main

      - name: Compile PDF
        id: compile-pdf
        uses: EasonSYC/latex-compile-pdf@main
        with:
          working-directory: ${{ matrix.course }}
          job-name: ${{ matrix.course }}
          job-name-version: false

  collect-ids:
    name: Collect Artifact IDs
    needs: compile-pdfs
    uses: ./.github/workflows/collect-artifact-ids.yml
    with:
      artifact-ids-json: ${{ toJSON(needs.compile-pdfs.outputs) }}