name: Compile PDFs

on:
  workflow_call:
    inputs:
      matrix:
        description: 'Course Matrix'
        required: true
        type: string

jobs:
  compile-pdfs:
    name: Compile PDF — ${{ matrix.course }}
    strategy:
      matrix: ${{ fromJson(inputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: EasonSYC/${{ matrix.course }}
          path: ${{ matrix.course }}

      - name: Setup TeX Live
        uses: EasonSYC/latex-style-setup@main

      - name: Compile PDF
        uses: EasonSYC/latex-compile-pdf@main
        with:
          working-directory: ${{ matrix.course }}
          job-name: ${{ matrix.course }}-notes
          job-name-version: false