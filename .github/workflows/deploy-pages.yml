name: Deploy GitHub Pages

on:
  workflow_call:
    outputs:
      page_url:
        description: "Deployed pages URL"
        value: ${{ jobs.deploy-pages.outputs.page_url }}

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-page.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deploy-page.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy-page
        uses: actions/deploy-pages@v4