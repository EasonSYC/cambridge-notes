name: Generate Course Matrix

on:
  workflow_call:
    outputs:
      matrix:
        description: "Course Matrix JSON"
        value: ${{ jobs.generate-matrix.outputs.matrix }}

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Matrix
        id: set-matrix
        run: |
          courses=$(cat .github/course.list | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix={\"course\":$courses}" >> $GITHUB_OUTPUT