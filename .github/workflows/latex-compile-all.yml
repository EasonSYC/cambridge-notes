name: LaTeX Compile All and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    name: Generate Course Name Matrix
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: set-matrix
        run: |
          courses=$(cat .github/course.list | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix={\"course\":$courses}" >> $GITHUB_OUTPUT
  
  compile-pdfs:
    name: Compile PDFs
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    outputs:
      pdf-name: ${{ steps.compile-pdf.outputs.pdf-name }}
    runs-on: ubuntu-latest
    needs: generate-matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: EasonSYC/${{ matrix.course }}

      - name: Setup TeX Live
        uses: EasonSYC/latex-style-setup@main

      - name: Compile PDF
        id: compile-pdf
        uses: EasonSYC/latex-compile-pdf@main
        with:
          job-name: ${{ matrix.course }}
          job-name-version: false
      
  create-pdf-artifact:
    name: Create Combined PDF Artifact
    runs-on: ubuntu-latest
    needs: compile-pdfs
    steps:
    - name: Retrieve Artifact
      uses: actions/download-artifact@v5
      with:
        path: pdfs
    
    - name: Upload PDF files
      id: upload-pdf
      uses: actions/upload-artifact@v7
      with:
        name: compiled-pdfs
        path: pdfs

  create-webpage-artifact:
    name: Create Webpage Artifact
    runs-on: ubuntu-latest
    needs: create-pdf-artifact
    steps:
    - name: Retrieve Artifact
      uses: actions/download-artifact@v5
      with:
        name: compiled-pdfs
        path: webpage/output
    
    - name: Index Compiled Files
      run: |
        cd webpage
        tree output -H output/ -T "Tripos Notes" -o "index.html"

    - name: Upload Static Files as Artifact
      id: upload-webpage
      uses: actions/upload-pages-artifact@v5
      with:
        path: webpage/

  deploy-pages:
    name: Deploy GitHub Pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-page.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: create-webpage-artifact
    steps:
      - name: Deploy to GitHub Pages
        id: deploy-page
        uses: actions/deploy-pages@v5
